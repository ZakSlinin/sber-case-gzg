services:
  reviews:
    build:
      context: ./reviews
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
    command: >
      sh -c "alembic upgrade head && fastapi run"
    volumes:
      - ./reviews/:/reviews 
 
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}


  email-verification:
    build:
      context: ./email-verification
    restart: always
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - URL_VERIFICATION=${URL_VERIFICATION}
      - NOTIFY_URL=${NOTIFY_URL}
   
